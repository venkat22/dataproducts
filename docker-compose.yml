services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dp_user
      POSTGRES_PASSWORD: dp_password
      POSTGRES_DB: dataproducts
    volumes:
      - dp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_user -d dataproducts"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://dp_user:dp_password@db:5432/dataproducts
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-us.anthropic.claude-sonnet-4-6}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  dp_pgdata:
